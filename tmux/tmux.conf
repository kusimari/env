# tmux configuration for enhanced pane highlighting
# Current configuration: White borders + Orange "● ACTIVE" status + Mouse support

# Full true color support (24-bit RGB) - fixes zsh autosuggestions and enables 16.7M colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -as terminal-overrides ',*:sitm=\E[3m'

# Mouse support - enable mouse clicks to focus panes, resize, select text, etc.
set -g mouse on

# Enable focus events for better integration with editors and tools like Claude Code
set -g focus-events on

# Enhanced border styling - ACTIVE CONFIGURATION
set -g pane-active-border-style fg=white,bold
set -g pane-border-style fg=colour240
set -g pane-border-lines double
set -g pane-border-indicators arrows
set -g pane-border-status top
# White borders + Orange "● ACTIVE" status with proper spacing
set -g pane-border-format "#{?pane_active,#[bg=default]#[fg=default]  #[bg=#ff6600]#[fg=white]#[bold] ● ACTIVE #[bg=default]#[fg=default] #P #{pane_current_path},#[bg=colour236]#[fg=colour250] #P #{pane_current_path} #[bg=default]#[fg=default]}"

# ============================================================================
# Session Persistence Configuration (tmux-resurrect + tmux-continuum)
# ============================================================================

# tmux-resurrect: Capture pane contents (scrollback history)
set -g @resurrect-capture-pane-contents 'on'

# Extended program restoration set
set -g @resurrect-processes 'ssh emacs "~emacs-gittree" lazygit lg vim nvim htop btop watch tail'

# Editor-specific session restoration strategies
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: Auto-save every 15 minutes
set -g @continuum-save-interval '15'

# Manual restore only - NO auto-restore on tmux start
set -g @continuum-restore 'off'