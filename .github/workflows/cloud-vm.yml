name: Cloud VM Deployment

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Cloud provider'
        required: true
        default: 'gcp'
        type: choice
        options:
        - gcp
        - aws
      action:
        description: 'Action to perform'
        required: true
        default: 'create'
        type: choice
        options:
        - create
        - destroy
      vm_name:
        description: 'VM name (unique identifier)'
        required: true
        default: 'dev-vm'
        type: string
      machine_type:
        description: 'Machine type (leave empty for default)'
        required: false
        type: string
      region:
        description: 'Region/Zone (leave empty for default)'
        required: false
        type: string

      # GCP-specific inputs
      gcp_project_id:
        description: '[GCP] Project ID'
        required: false
        type: string
      gcp_workload_identity_provider:
        description: '[GCP] Workload Identity Provider (full path)'
        required: false
        type: string
      gcp_service_account:
        description: '[GCP] Service Account Email'
        required: false
        type: string

      # AWS-specific inputs
      aws_region:
        description: '[AWS] AWS Region'
        required: false
        type: string
      aws_role_arn:
        description: '[AWS] IAM Role ARN for OIDC'
        required: false
        type: string

      # Destroy confirmation
      destroy_confirmation:
        description: '[DESTROY ONLY] Type "DELETE" to confirm destruction'
        required: false
        type: string

jobs:
  security-check:
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
    - name: Verify authorized user
      id: check
      env:
        ACTOR: ${{ github.actor }}
      run: |
        if [[ "$ACTOR" == "kusimari" ]]; then
          echo "User $ACTOR is authorized"
          echo "authorized=true" >> $GITHUB_OUTPUT
        else
          echo "User $ACTOR is not authorized for cloud deployments"
          echo "authorized=false" >> $GITHUB_OUTPUT
          exit 1
        fi

  validate-inputs:
    needs: security-check
    if: needs.security-check.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Validate inputs
      id: validate
      env:
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_VM_NAME: ${{ inputs.vm_name }}
        INPUT_DESTROY_CONFIRM: ${{ inputs.destroy_confirmation }}
        INPUT_GCP_PROJECT: ${{ inputs.gcp_project_id }}
        INPUT_GCP_WIF: ${{ inputs.gcp_workload_identity_provider }}
        INPUT_GCP_SA: ${{ inputs.gcp_service_account }}
        INPUT_AWS_ROLE: ${{ inputs.aws_role_arn }}
      run: |
        # Validate VM name (alphanumeric, hyphens, underscores only)
        if [[ ! "$INPUT_VM_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "Invalid VM name: $INPUT_VM_NAME"
          echo "VM name must contain only letters, numbers, hyphens, and underscores"
          exit 1
        fi

        # Validate destroy confirmation
        if [[ "$INPUT_ACTION" == "destroy" && "$INPUT_DESTROY_CONFIRM" != "DELETE" ]]; then
          echo "Destroy action requires typing 'DELETE' in the confirmation field"
          exit 1
        fi

        # Validate provider-specific inputs
        if [[ "$INPUT_PROVIDER" == "gcp" ]]; then
          if [[ -z "$INPUT_GCP_PROJECT" || -z "$INPUT_GCP_WIF" || -z "$INPUT_GCP_SA" ]]; then
            echo "GCP deployment requires gcp_project_id, gcp_workload_identity_provider, and gcp_service_account"
            exit 1
          fi
        fi

        if [[ "$INPUT_PROVIDER" == "aws" ]]; then
          if [[ -z "$INPUT_AWS_ROLE" ]]; then
            echo "AWS deployment requires aws_role_arn"
            exit 1
          fi
        fi

        echo "All inputs validated"

  deploy-gcp:
    needs: [security-check, validate-inputs]
    if: needs.security-check.outputs.authorized == 'true' && inputs.provider == 'gcp'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      connection_info: ${{ steps.create.outputs.connection_info }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
        service_account: ${{ inputs.gcp_service_account }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Load configuration
      id: config
      env:
        INPUT_MACHINE_TYPE: ${{ inputs.machine_type }}
        INPUT_REGION: ${{ inputs.region }}
      run: |
        MACHINE_TYPE="$INPUT_MACHINE_TYPE"
        if [[ -z "$MACHINE_TYPE" ]]; then
          MACHINE_TYPE=$(yq '.defaults.gcp.machine_type' cloud/config.yaml)
        fi

        ZONE="$INPUT_REGION"
        if [[ -z "$ZONE" ]]; then
          ZONE=$(yq '.defaults.gcp.zone' cloud/config.yaml)
        fi

        echo "machine_type=$MACHINE_TYPE" >> $GITHUB_OUTPUT
        echo "zone=$ZONE" >> $GITHUB_OUTPUT
        echo "disk_size=$(yq '.defaults.gcp.disk_size_gb' cloud/config.yaml)" >> $GITHUB_OUTPUT
        echo "image_family=$(yq '.defaults.gcp.image_family' cloud/config.yaml)" >> $GITHUB_OUTPUT
        echo "image_project=$(yq '.defaults.gcp.image_project' cloud/config.yaml)" >> $GITHUB_OUTPUT

    - name: Create GCP VM
      if: inputs.action == 'create'
      id: create
      env:
        VM_NAME: env-${{ inputs.vm_name }}
        GCP_PROJECT: ${{ inputs.gcp_project_id }}
        ZONE: ${{ steps.config.outputs.zone }}
        MACHINE_TYPE: ${{ steps.config.outputs.machine_type }}
        IMAGE_FAMILY: ${{ steps.config.outputs.image_family }}
        IMAGE_PROJECT: ${{ steps.config.outputs.image_project }}
        DISK_SIZE: ${{ steps.config.outputs.disk_size }}
      run: |
        echo "Creating GCP VM: $VM_NAME"

        gcloud compute instances create "$VM_NAME" \
          --project="$GCP_PROJECT" \
          --zone="$ZONE" \
          --machine-type="$MACHINE_TYPE" \
          --image-family="$IMAGE_FAMILY" \
          --image-project="$IMAGE_PROJECT" \
          --boot-disk-size="$DISK_SIZE" \
          --boot-disk-type="pd-standard" \
          --tags="env-cloud-vm" \
          --metadata-from-file="startup-script=cloud/init-gcp.sh" \
          --scopes="https://www.googleapis.com/auth/cloud-platform"

        echo "Waiting for VM to be ready..."
        sleep 30

        VM_IP=$(gcloud compute instances describe "$VM_NAME" \
          --project="$GCP_PROJECT" \
          --zone="$ZONE" \
          --format="value(networkInterfaces[0].accessConfigs[0].natIP)")

        echo "VM created successfully!"

        # Generate connection info for summary
        {
          echo "connection_info<<CONNEOF"
          echo "## GCP VM Connection Information"
          echo ""
          echo "**VM:** \`$VM_NAME\` | **IP:** \`$VM_IP\` | **Zone:** \`$ZONE\` | **Type:** \`$MACHINE_TYPE\`"
          echo ""
          echo "**SSH Methods:**"
          echo "1. **Browser:** [GCP Console](https://console.cloud.google.com/compute/instances?project=$GCP_PROJECT) → SSH"
          echo "2. **gcloud:** \`gcloud compute ssh kusimari@$VM_NAME --zone=$ZONE --project=$GCP_PROJECT\`"
          echo "3. **Direct:** \`ssh kusimari@$VM_IP\`"
          echo ""
          echo "**Status:** Ubuntu → NixOS conversion in progress (5-10 min). Check: \`gcloud compute instances get-serial-port-output $VM_NAME --zone=$ZONE --project=$GCP_PROJECT\`"
          echo "CONNEOF"
        } >> $GITHUB_OUTPUT

    - name: Destroy GCP VM
      if: inputs.action == 'destroy'
      env:
        VM_NAME: env-${{ inputs.vm_name }}
        GCP_PROJECT: ${{ inputs.gcp_project_id }}
        ZONE: ${{ steps.config.outputs.zone }}
      run: |
        echo "Destroying GCP VM: $VM_NAME"

        if gcloud compute instances describe "$VM_NAME" \
           --project="$GCP_PROJECT" --zone="$ZONE" >/dev/null 2>&1; then
          gcloud compute instances delete "$VM_NAME" \
            --project="$GCP_PROJECT" --zone="$ZONE" --quiet
          echo "VM destroyed successfully!"
        else
          echo "VM not found (may already be deleted)"
        fi

  deploy-aws:
    needs: [security-check, validate-inputs]
    if: needs.security-check.outputs.authorized == 'true' && inputs.provider == 'aws'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      connection_info: ${{ steps.create.outputs.connection_info }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region || 'us-east-1' }}

    - name: Load configuration and find AMI
      id: config
      env:
        INPUT_MACHINE_TYPE: ${{ inputs.machine_type }}
        INPUT_REGION: ${{ inputs.aws_region }}
      run: |
        INSTANCE_TYPE="$INPUT_MACHINE_TYPE"
        if [[ -z "$INSTANCE_TYPE" ]]; then
          INSTANCE_TYPE=$(yq '.defaults.aws.instance_type' cloud/config.yaml)
        fi

        REGION="$INPUT_REGION"
        if [[ -z "$REGION" ]]; then
          REGION=$(yq '.defaults.aws.region' cloud/config.yaml)
        fi

        # Find latest NixOS AMI
        AMI_ID=$(aws ec2 describe-images \
          --owners 427812963091 \
          --filters "Name=name,Values=nixos-*" "Name=state,Values=available" \
          --query 'Images | sort_by(@, &CreationDate) | [-1].ImageId' \
          --output text \
          --region "$REGION")

        if [[ "$AMI_ID" == "None" || -z "$AMI_ID" ]]; then
          echo "No NixOS AMI found in region $REGION"
          exit 1
        fi

        echo "instance_type=$INSTANCE_TYPE" >> $GITHUB_OUTPUT
        echo "region=$REGION" >> $GITHUB_OUTPUT
        echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
        echo "volume_size=$(yq '.defaults.aws.volume_size' cloud/config.yaml)" >> $GITHUB_OUTPUT

    - name: Create AWS EC2 Instance
      if: inputs.action == 'create'
      id: create
      env:
        VM_NAME: env-${{ inputs.vm_name }}
        AMI_ID: ${{ steps.config.outputs.ami_id }}
        INSTANCE_TYPE: ${{ steps.config.outputs.instance_type }}
        REGION: ${{ steps.config.outputs.region }}
      run: |
        echo "Creating AWS EC2 Instance: $VM_NAME"
        echo "Using AMI: $AMI_ID"

        # Find the env-cloud-ssh security group created by bootstrap
        SG_ID=$(aws ec2 describe-security-groups \
          --filters "Name=group-name,Values=env-cloud-ssh" \
          --query 'SecurityGroups[0].GroupId' --output text \
          --region "$REGION")

        if [[ "$SG_ID" == "None" || -z "$SG_ID" ]]; then
          echo "Security group 'env-cloud-ssh' not found. Run cloud/bootstrap/aws-setup.sh first."
          exit 1
        fi

        # Encode init script as base64
        INIT_SCRIPT_B64=$(base64 -w 0 cloud/init-aws.sh)

        # Create instance with dedicated security group
        INSTANCE_JSON=$(aws ec2 run-instances \
          --image-id "$AMI_ID" \
          --instance-type "$INSTANCE_TYPE" \
          --user-data "$INIT_SCRIPT_B64" \
          --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=$VM_NAME},{Key=Purpose,Value=env-cloud},{Key=Repository,Value=kusimari/env}]" \
          --security-group-ids "$SG_ID" \
          --region "$REGION")

        INSTANCE_ID=$(echo "$INSTANCE_JSON" | jq -r '.Instances[0].InstanceId')

        echo "Waiting for instance to be running..."
        aws ec2 wait instance-running --instance-ids "$INSTANCE_ID" --region "$REGION"

        INSTANCE_INFO=$(aws ec2 describe-instances \
          --instance-ids "$INSTANCE_ID" \
          --query 'Reservations[0].Instances[0]' \
          --region "$REGION")

        VM_IP=$(echo "$INSTANCE_INFO" | jq -r '.PublicIpAddress')
        AZ=$(echo "$INSTANCE_INFO" | jq -r '.Placement.AvailabilityZone')

        echo "Instance created successfully!"

        # Generate connection info for summary
        {
          echo "connection_info<<CONNEOF"
          echo "## AWS EC2 Connection Information"
          echo ""
          echo "**Instance:** \`$VM_NAME\` (\`$INSTANCE_ID\`) | **IP:** \`$VM_IP\` | **AZ:** \`$AZ\` | **Type:** \`$INSTANCE_TYPE\`"
          echo ""
          echo "**SSH Methods:**"
          echo "1. **Browser:** [EC2 Console](https://console.aws.amazon.com/ec2/home?region=$REGION#Instances:) → Connect → EC2 Instance Connect"
          echo "2. **CLI:** \`aws ec2-instance-connect send-ssh-public-key --instance-id $INSTANCE_ID --instance-os-user kusimari --ssh-public-key file://~/.ssh/id_rsa.pub --availability-zone $AZ && ssh kusimari@$VM_IP\`"
          echo "3. **Direct:** \`ssh kusimari@$VM_IP\`"
          echo ""
          echo "**Status:** NixOS config being applied (2-5 min). Check: \`aws ec2 get-console-output --instance-id $INSTANCE_ID --region $REGION\`"
          echo "CONNEOF"
        } >> $GITHUB_OUTPUT

    - name: Destroy AWS EC2 Instance
      if: inputs.action == 'destroy'
      env:
        VM_NAME: env-${{ inputs.vm_name }}
        REGION: ${{ steps.config.outputs.region }}
      run: |
        echo "Destroying AWS EC2 Instance: $VM_NAME"

        INSTANCE_ID=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=$VM_NAME" "Name=instance-state-name,Values=running,stopped,stopping,pending" \
          --query 'Reservations[].Instances[].[InstanceId]' \
          --output text \
          --region "$REGION")

        if [[ -n "$INSTANCE_ID" && "$INSTANCE_ID" != "None" ]]; then
          aws ec2 terminate-instances --instance-ids "$INSTANCE_ID" --region "$REGION"
          echo "Instance $INSTANCE_ID terminated successfully!"
        else
          echo "Instance not found (may already be terminated)"
        fi

  summary:
    needs: [security-check, validate-inputs, deploy-gcp, deploy-aws]
    if: always() && needs.security-check.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Generate deployment summary
      env:
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_VM_NAME: ${{ inputs.vm_name }}
        ACTOR: ${{ github.actor }}
        GCP_RESULT: ${{ needs.deploy-gcp.result }}
        AWS_RESULT: ${{ needs.deploy-aws.result }}
        GCP_CONN: ${{ needs.deploy-gcp.outputs.connection_info }}
        AWS_CONN: ${{ needs.deploy-aws.outputs.connection_info }}
      run: |
        echo "# Cloud VM Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Action:** $INPUT_ACTION | **Provider:** $INPUT_PROVIDER | **VM:** $INPUT_VM_NAME | **By:** @$ACTOR" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ "$INPUT_ACTION" == "create" ]]; then
          if [[ "$INPUT_PROVIDER" == "gcp" && "$GCP_RESULT" == "success" ]]; then
            echo "$GCP_CONN" >> $GITHUB_STEP_SUMMARY
          elif [[ "$INPUT_PROVIDER" == "aws" && "$AWS_RESULT" == "success" ]]; then
            echo "$AWS_CONN" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Deployment failed.** Check the job logs for details." >> $GITHUB_STEP_SUMMARY
          fi
        elif [[ "$INPUT_ACTION" == "destroy" ]]; then
          if [[ "$INPUT_PROVIDER" == "gcp" && "$GCP_RESULT" == "success" ]]; then
            echo "**VM destroyed successfully.**" >> $GITHUB_STEP_SUMMARY
          elif [[ "$INPUT_PROVIDER" == "aws" && "$AWS_RESULT" == "success" ]]; then
            echo "**VM destroyed successfully.**" >> $GITHUB_STEP_SUMMARY
          elif [[ "$GCP_RESULT" == "skipped" && "$AWS_RESULT" == "skipped" ]]; then
            echo "**No deployment job ran.** Check inputs." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Destroy may have failed.** Check the job logs." >> $GITHUB_STEP_SUMMARY
          fi
        fi
